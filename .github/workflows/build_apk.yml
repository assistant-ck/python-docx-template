name: Build Android APK

on:
  repository_dispatch:
    types: [build-release]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag (例如: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.client_payload.tag || inputs.tag }}
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npm run prebuild:android:ci

      - name: Prepare signing files
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEYSTORE_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      - name: Build release APK
        run: npm run build:apk:release:ci

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          files: android/app/build/outputs/apk/release/*.apk
          # 允许更新已存在的 Release
          make_latest: true
