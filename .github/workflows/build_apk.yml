name: Build Android

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'branch'
        default: 'main'
        required: true
        type: string
      release_tag:
        description: 'tag'
        required: true
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ inputs.branch }}

      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          npm ci > /dev/null 2>&1
          npm run prebuild:android:ci > /dev/null 2>&1

      - name: Prepare signing files
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEYSTORE_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          chmod +x android/gradlew

      - name: Build release APK
        run: npm run build:apk:release:ci > build_log.txt 2>&1 || (echo "Build Failed! Check environment." && exit 1)

      - name: Upload to Private Release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          tag_name: ${{ inputs.release_tag }}
          files: android/app/build/outputs/apk/release/*.apk

      - name: Bark Notification
        if: always()
        run: curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/AndroidBuild/${{ job.status }}" > /dev/null
