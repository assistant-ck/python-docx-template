name: Build Private Repo APK

on:
  # 支持在 GitHub Actions 页面手动触发构建
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      # 1. 检出私有仓库代码
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.inputs.branch }}

      # 2. 环境准备 (Node.js 20 & Java 17)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. 安装依赖并生成原生 Android 工程
      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npm run prebuild:android:ci

      # 4. 配置签名文件
      - name: Prepare signing files
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEYSTORE_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # 5. 赋予 gradlew 执行权限并打包 Release APK
      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      - name: Build release APK
        run: npm run build:apk:release:ci

      # 6. 将 APK 作为 Artifact 上传（回传）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
