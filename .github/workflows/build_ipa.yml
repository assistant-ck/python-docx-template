name: Build ipa

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本标签 (例如: v0.0.2)'
        required: true
        type: string
      release_notes:
        description: '版本更新说明'
        required: false
        type: string

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8

    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install JS dependencies
        run: |
          set -e
          if [ -f package-lock.json ]; then
            npm ci --include=optional
          else
            npm install --include=optional
          fi

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # 7 & 8. 动态生成配置、编译归档并导出 IPA
      - name: Build and export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
        run: |
          cd ios
          
          # 1. 动态获取 Workspace 和 Scheme
          WORKSPACE=$(ls -1 | grep "\.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          # 2. 从描述文件中硬提取 UUID
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          PP_UUID=$(security cms -D -i "$PP_PATH" | grep -A1 UUID | grep -o "[-a-zA-Z0-9]\{36\}")
          
          # 3. 精准提取 Bundle ID (直接读取你刚改好的 app.json)
          BUNDLE_ID=$(node -p "require('../app.json').expo.ios.bundleIdentifier")
          
          echo "==== 签名与导出参数 ===="
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "Team ID: $APPLE_TEAM_ID"
          echo "Profile UUID: $PP_UUID"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Export Method: $IOS_EXPORT_METHOD"
          echo "======================="

          # 4. 动态生成完美版的 exportOptions.plist (加入 provisioningProfiles 映射)
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$IOS_EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PP_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          ARCHIVE_PATH="build/$SCHEME.xcarchive"
          
          # Step 1: 归档 (Archive)
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE="$PP_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_UUID" \
            CODE_SIGN_IDENTITY="iPhone Distribution"

          # Step 2: 导出 IPA (Export)
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA to Private Repo Release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }} 
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}    
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          body: ${{ github.event.inputs.release_notes }}
          files: ios/build/ipa/*.ipa

      # 10. 清理钥匙串
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
