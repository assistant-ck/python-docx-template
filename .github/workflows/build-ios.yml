name: Build iOS (Debug)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'branch'
        default: 'main'
        required: true
        type: string
      release_tag:
        description: 'tag'
        required: true
        type: string

permissions: {}

jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Set up Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install dependencies
        # 完全输出依赖和 Pod 安装日志
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile
          gem install cocoapods --no-document
          cd ios && pod install --repo-update

      - name: Install Certificates
        env:
          CERT_P12_PASSWORD: ${{ secrets.IOS_CERT_P12_PASSWORD }}
        run: |
          echo "${{ secrets.IOS_CERTIFICATE }}" | base64 --decode > ios_cert.p12
          security create-keychain -p actions-keychain actions.keychain
          security default-keychain -s actions.keychain
          security unlock-keychain -p actions-keychain actions.keychain
          security import ios_cert.p12 -k actions.keychain -P "$CERT_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions-keychain actions.keychain
          
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > provisioning.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Create exportOptions.plist
        run: |
          cat > ios/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>method</key>
              <string>${{ secrets.IOS_EXPORT_METHOD }}</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>compileBitcode</key>
              <false/>
            </dict>
          </plist>
          EOF

      - name: Build and export IPA
        run: |
          cd ios
          # 【注意】调试前请确认替换为你实际的 Workspace 和 Scheme 名称！
          WORKSPACE="YourApp.xcworkspace"
          SCHEME="YourScheme"
          
          echo "==== Starting Compilation ===="
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build ONLY_ACTIVE_ARCH=NO CODE_SIGN_STYLE=Manual
          
          echo "==== Starting Archive ===="
          ARCHIVE_PATH="build/$SCHEME.xcarchive"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -archivePath "$ARCHIVE_PATH" archive
          
          echo "==== Starting Export ===="
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" -exportOptionsPlist exportOptions.plist -exportPath ipa



      - name: Upload to Private Release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          tag_name: ${{ inputs.release_tag }}
          files: ios/ipa/*.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain actions.keychain || true

      - name: Bark Notification
        if: always()
        run: curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/iOSBuild/${{ job.status }}"
